---
name: Common job setup (Checkout, install uv, create venv)
description: >
  Installs uv, the version of Python to test, and then installs the project into a venv.

  Because YAML anchors _still_ aren't implemented. (https://github.com/actions/runner/issues/1182)
inputs:
  python-version:
    description: Which Python version should be installed
    required: false
    default: '3.13'
runs:
  using: composite
  steps:
    - name: Check out repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3 - https://github.com/actions/checkout/releases/tag/v6.0.3

    # Using the caching mechanism for Poetry provided by `actions/setup-python` requires that Poetry be available beforehand
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0 - https://github.com/astral-sh/setup-uv/releases/tag/v8.2.0
      with:
        version: "0.11.21"
        python-version: ${{ inputs.python-version }}
        enable-cache: true
        cache-dependency-glob: |
          **/pyproject.toml
          **/uv.lock

    - name: Set up python
      id: setup-python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0 - https://github.com/actions/setup-python/releases/tag/v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Create the project's venv
      run: uv sync --frozen
      shell: bash
