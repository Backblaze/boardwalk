---
name: CI Suite

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  workflow_entrypoint:
    name: Entrypoint
    runs-on: ubuntu-latest
    steps:
      - name: Intentionally Empty Step
        run: exit 0

  run_linters:
    name: Run linters
    needs: workflow_entrypoint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0 - https://github.com/actions/checkout/releases/tag/v7.0.0

      - name: Proceed to run linters
        id: linter-setup
        run: ':'

      - name: Run ansible-lint
        if: steps.linter-setup.conclusion == 'success' && !cancelled()
        uses: ansible/ansible-lint@262624cd0ab22a4221293216856c59671ce7aa5e  # v26.6.0 - https://github.com/ansible/ansible-lint/releases/tag/v26.6.0
        with:
          args: "--config-file ${{ github.workspace }}/test/ansible-lint.yaml"
          working_directory: ${{ github.workspace }}/test

      - name: Ruff - Linting
        if: steps.linter-setup.conclusion == 'success' && !cancelled()
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0 - https://github.com/astral-sh/ruff-action/releases/tag/v4.0.0

      - name: Ruff - Formatting
        if: steps.linter-setup.conclusion == 'success' && !cancelled()
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0 - https://github.com/astral-sh/ruff-action/releases/tag/v4.0.0
        with:
          args: "format --check"

  run_all_tests:
    name: Boardwalk Test Suite
    needs: workflow_entrypoint
    runs-on: ubuntu-latest
    # Locally, the pytest phase with integration takes ~8 minutes or so 60
    # should be more than overkill (down from default 360)
    timeout-minutes: 60
    strategy:
      matrix:
        python-version: ['3.13', '3.14']
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0 - https://github.com/actions/checkout/releases/tag/v7.0.0

      - name: Run default job setup (Checkout, uv, python, install project)
        uses: ./.github/actions/project_setup
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Configure the runner to allow it to ssh to itself
        run: |
          # 1. Create an SSH directory if it doesn't exist
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 2. Generate a new ed25519 keypair with no passphrase
          ssh-keygen -t ed25519 -N "" -f ~/.ssh/id_ed25519

          # 3. Add the public key to the authorized_keys file
          cat ~/.ssh/id_ed25519.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

          # 4. Add localhost to known_hosts to prevent the StrictHostKeyChecking prompt
          ssh-keyscan -H 127.0.0.1 >> ~/.ssh/known_hosts
          ssh-keyscan -H localhost >> ~/.ssh/known_hosts

      - name: Execute Python test suite
        run: make test-pytest

      # Commented out because we're planning on switching to a different static
      # typechecker, and frankly whatever is taking pyright _minutes_ to run is
      # a little excessive, for now.
      # - run: make test-pyright

  docs_build_test:
    name: Run a test build of documentation
    needs: workflow_entrypoint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0 - https://github.com/actions/checkout/releases/tag/v7.0.0

      - name: Run default job setup (Checkout, uv, python, install project)
        uses: ./.github/actions/project_setup

      - name: Ensure documentation is able to build without errors
        run: make docs
